# Servicios de Moira (API y dashboard) para que Nicolas los agregue
# a su docker-compose.yml. Van debajo de "services:".
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      - DB_PATH=/data/exoplanets.db
    volumes:
      - db-data:/data        # mismo volumen donde el ETL deja la base
    ports:
      - "8000:8000"
    depends_on:
      - etl

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
